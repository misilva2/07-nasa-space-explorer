<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>

  <!-- Performance: start DNS/TLS handshakes early for fonts and NASA API -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.nasa.gov" crossorigin />

  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <a href="#mainContent" class="skip-link">Skip to main content</a>
  <div class="container">
    <header class="site-header">
      <img src="img/NASA-Logo-Large.jpg" alt="NASA Logo" class="logo" width="800" height="665" loading="eager" decoding="async" fetchpriority="high" />
      <h1>Space Explorer</h1>
    </header>

    <main id="mainContent">
      <form class="filters" aria-label="APOD date range filters">
        <div class="field-group">
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" />
        </div>
        <div class="field-group">
          <label for="endDate">End date</label>
          <input type="date" id="endDate" />
        </div>
        <button type="button">Get Space Images</button>
      </form>

      <section id="spaceFact" class="space-fact" aria-live="polite">
        <p class="space-fact-label">Did You Know?</p>
        <p id="spaceFactText"></p>
      </section>

      <div id="galleryStatus" class="sr-only" aria-live="polite"></div>

      <section id="gallery" class="gallery" aria-label="Astronomy picture gallery">
        <div class="placeholder">
          <div class="placeholder-icon" aria-hidden="true">🔭</div>
          <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
        </div>
      </section>

      <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modalTitle" aria-describedby="modalDate modalExplanation" tabindex="-1">
        <div class="modal-content">
          <button id="closeModalButton" class="modal-close-button" aria-label="Close modal">Close</button>
          <img id="modalImage" src="" alt="" />
          <h2 id="modalTitle"></h2>
          <p id="modalDate" class="modal-date"></p>
          <p id="modalExplanation" class="modal-explanation"></p>
        </div>
      </div>
    </main>
  </div>

  <script defer src="js/dateRange.js"></script>
  <script defer src="js/script.js"></script>
</body>
</html>
